<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Fariba Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #af944d; --black: #1a1a1a; --white: #ffffff; --gray: #f9f9f9; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--white); color: var(--black); text-align: center; }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .logo { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 22px; text-decoration: none; color: black; }
        
        .thank-you-container { padding: 120px 10%; max-width: 800px; margin: 0 auto; }
        .thank-you-container h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 20px; }
        .thank-you-container p { color: #555; font-size: 1.2rem; line-height: 1.8; margin-bottom: 40px; }
        
        .back-btn { 
            background: var(--black); color: white; padding: 18px 40px; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600; 
            text-decoration: none; transition: 0.3s; display: inline-block;
        }
        .back-btn:hover { background: var(--gold); transform: translateY(-2px); }

        .footer-note { margin-top: 60px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        
        footer { padding: 40px; background: #111; color: #777; text-align: center; font-size: 12px; position: absolute; bottom: 0; width: 100%; }

        @media (max-width: 768px) {
            .thank-you-container h1 { font-size: 2.5rem; }
            .thank-you-container { padding: 80px 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Fariba Studio</a>
    </nav>

    <main class="thank-you-container">
        <span style="color: var(--gold); font-size: 3rem;">♥</span>
        <h1>Thank You</h1>
        <p>
            Your inquiry has been successfully received.
        </p>
        <p style="font-size: 1rem; color: #888;">
            I aim to respond to all inquiries within two business days.
        </p>
        
        <a href="index.html" class="back-btn">Return to Studio</a>
        
        <div class="footer-note">East Coast Canada</div>
    </main>

    <footer>&copy; 2026 FARIBA STUDIO | ALL WORKS ARE HAND-PAINTED ORIGINALS</footer>

</body>
</html>
